<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CGP — Welcome!</title>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <div id="page-loader">
    <div class="loader-logo">CGP</div>
    <div class="loader-dots">
      <div class="loader-dot"></div>
      <div class="loader-dot"></div>
      <div class="loader-dot"></div>
    </div>
  </div>

  <main class="welcome-page">
    <div class="welcome-card">
      <div class="welcome-emoji">🎉</div>
      <h1>Welcome, <span id="welcome-name">Student</span>!</h1>
      <p>Thank you for visiting <strong>College Group Point (CGP)</strong>.<br />
        We are excited to help you find the perfect college for your future!!</p>
      <div class="welcome-divider"></div>
      <div style="display:flex;gap:1.5rem;justify-content:center;margin-bottom:1.5rem;flex-wrap:wrap;">
        <div style="text-align:center;">
          <div style="font-size:1.5rem;font-weight:700;color:var(--blue)">70+</div>
          <div style="font-size:0.78rem;color:var(--text-soft)">Colleges Listed</div>
        </div>

        <div style="text-align:center;">
          <div style="font-size:1.5rem;font-weight:700;color:var(--purple)">10K+</div>
          <div style="font-size:0.78rem;color:var(--text-soft)">Students Helped</div>
        </div>
      </div>
      <button id="explore-btn" class="btn btn-primary welcome-cta"> Start My Journey</button>
    </div>
  </main>

  <script src="js/script.js"></script>
</body>

</html>
